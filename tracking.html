<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Track your Amazon order in real time.">
    <title>Track Your Order — Amazon</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/variables.css">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/tracking.css">
  </head>
  <body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- ── Site header ─────────────────────────────────────────────────── -->
    <header class="amazon-header">
      <div class="amazon-header-left-section">
        <a href="index.html" class="header-link" aria-label="Amazon — go to homepage">
          <img class="amazon-logo" src="images/amazon-logo-white.png" alt="Amazon">
          <img class="amazon-mobile-logo" src="images/amazon-mobile-logo-white.png" alt="Amazon">
        </a>
      </div>

      <div class="amazon-header-middle-section">
        <form class="search-form" role="search" aria-label="Search products"
          action="index.html" method="get">
          <input class="search-bar" type="search" name="q"
            placeholder="Search Amazon" aria-label="Search for products" autocomplete="off">
          <button class="search-button" type="submit" aria-label="Submit search">
            <img class="search-icon" src="images/icons/search-icon.png" alt="">
          </button>
        </form>
      </div>

      <nav class="amazon-header-right-section" aria-label="Account and cart">
        <a class="orders-link header-link" href="orders.html"
          aria-label="Returns and Orders">
          <span class="returns-text">Returns</span>
          <span class="orders-text">&amp; Orders</span>
        </a>
        <a class="cart-link header-link" href="checkout.html"
          aria-label="Shopping cart">
          <img class="cart-icon" src="images/icons/cart-icon.png" alt="">
          <span class="cart-quantity">3</span>
          <span class="cart-text">Cart</span>
        </a>
      </nav>

      <!-- Hamburger button — hidden on desktop, shown on mobile via CSS -->
      <button class="hamburger-btn js-hamburger"
        type="button"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="mobile-nav">
        <svg class="hamburger-svg js-hamburger-svg"
          viewBox="0 0 32 32"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true">
          <path class="hamburger-path-morph"
            d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"/>
          <path d="M7 16 27 16"/>
        </svg>
      </button>

    </header>

    <!-- Mobile nav dropdown — fixed below the header, toggled by JS -->
    <nav class="mobile-nav js-mobile-nav"
      id="mobile-nav"
      aria-label="Mobile navigation"
      aria-hidden="true">
      <a class="mobile-nav-link" href="orders.html">
        <span>Returns &amp; Orders</span>
      </a>
      <a class="mobile-nav-link" href="checkout.html">
        <span>Cart</span>
        <span class="mobile-cart-badge js-mobile-cart-qty" aria-live="polite"></span>
      </a>
    </nav>

    <!-- ── Main content ────────────────────────────────────────────────── -->
    <main class="main" id="main-content">
      <article class="order-tracking">

        <a class="back-to-orders-link link-primary" href="orders.html">
          &#8592; View all orders
        </a>

        <h1 class="delivery-date">Arriving on Monday, June 13</h1>

        <p class="product-info">Black and Gray Athletic Cotton Socks - 6 Pairs</p>
        <p class="product-info">Quantity: 1</p>

        <img class="product-image"
          src="images/products/athletic-cotton-socks-6-pairs.jpg"
          alt="Black and Gray Athletic Cotton Socks">

        <!-- Progress indicator -->
        <div class="progress-labels-container" aria-label="Shipment status">
          <span class="progress-label completed">Preparing</span>
          <span class="progress-label current-status" aria-current="true">Shipped</span>
          <span class="progress-label">Delivered</span>
        </div>

        <div class="progress-bar-container" role="progressbar"
          aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"
          aria-label="Order progress: Shipped">
          <div class="progress-bar"></div>
        </div>

      </article>
    </main>

    <footer class="site-footer">
      <p>&copy; 2025, Amazon.com, Inc. or its affiliates. All rights reserved.</p>
    </footer>

  <script type="module" src="scripts/tracking.js"></script>
  </body>
</html>
