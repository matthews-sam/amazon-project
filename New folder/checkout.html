<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Review and place your Amazon order securely.">
    <title>Amazon Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/variables.css">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css">
    <link rel="stylesheet" href="styles/pages/checkout/checkout.css">
  </head>
  <body>

    <!-- ── Checkout header (simplified — no search bar) ───────────────── -->
    <header class="checkout-header">
      <div class="header-content">

        <div class="checkout-header-left-section">
          <a href="index.html" aria-label="Return to Amazon homepage">
            <img class="amazon-logo"
              src="images/amazon-logo.png"
              alt="Amazon">
            <img class="amazon-mobile-logo"
              src="images/amazon-mobile-logo.png"
              alt="Amazon">
          </a>
        </div>

        <!-- Item count is updated dynamically by checkout.js -->
        <div class="checkout-header-middle-section">
          Checkout (<a class="return-to-home-link js-return-to-home-link"
            href="index.html">3 items</a>)
        </div>

        <div class="checkout-header-right-section">
          <img src="images/icons/checkout-lock-icon.png"
            alt="Secure checkout">
        </div>

      </div>
    </header><!-- /header -->

    <!-- ── Main content ────────────────────────────────────────────────── -->
    <main class="main" id="main-content">

      <h1 class="page-title">Review your order</h1>

      <div class="checkout-grid">

        <!-- Order items — rendered by orderSummary.js -->
        <section class="order-summary js-order-summary"
          aria-label="Order items">
        </section>

        <!-- Payment panel — rendered by paymentSummary.js -->
        <aside class="payment-summary js-payment-summary"
          aria-label="Payment summary">
        </aside>

      </div>

    </main>

    <script type="module" src="scripts/checkout.js"></script>
  </body>
</html>
